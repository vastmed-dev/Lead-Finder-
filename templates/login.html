<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Lead Finder CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon"><i class="bi bi-search-heart"></i></div>
        <div>
          <h3 class="mb-0">Lead Finder CRM</h3>
          <small>Secure dashboard login</small>
        </div>
      </div>

      <div class="mt-4 mb-4">
        <h4 class="fw-bold mb-1">Welcome back</h4>
        <p class="text-muted mb-0">Please login to access your leads, campaigns, reports, and follow-up dashboard.</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login
        </button>
      </form>

      
    </div>
  </div>
</body>
</html>
